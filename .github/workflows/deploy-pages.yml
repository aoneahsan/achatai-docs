# ──────────────────────────────────────────────────────────────────────────
# GitHub Pages deploy — AChat documentation site (achatai-docs)
#
# Builds the Docusaurus site and publishes it to GitHub Pages. This is the
# FREE fallback host for the public docs (the docs repo is public). Firebase
# Hosting (target `achatai-docs`, see firebase.json) is the primary host.
#
# Custom domain: static/CNAME (achatai-docs.aoneahsan.com). Point the domain's
# DNS at WHICHEVER host you activate — never both at once for the same domain.
# To use the default *.github.io URL instead, delete static/CNAME and set
# `baseUrl: '/achatai-docs/'` in docusaurus.config.ts.
# ──────────────────────────────────────────────────────────────────────────
name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs of the same group.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Docusaurus)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn)
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build
        run: yarn build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
