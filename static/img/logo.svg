<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="AChat logo">
  <defs>
    <linearGradient id="ac-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.55" stop-color="#5b21b6"/>
      <stop offset="1" stop-color="#3b0f73"/>
    </linearGradient>
    <linearGradient id="ac-key" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#ac-bg)"/>
  <!-- 10-day countdown ring dissolving at the top -->
  <path d="M19.4 7.6 A9.1 9.1 0 1 1 12.6 7.6" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="18.3" cy="7.2" r="1.0" fill="#ffffff"/>
  <circle cx="17.0" cy="6.95" r="0.6" fill="#ffffff" fill-opacity="0.55"/>
  <!-- chat bubble -->
  <rect x="10.6" y="11.4" width="10.8" height="7.8" rx="2.1" fill="#ffffff"/>
  <path d="M12.8 19.2 L11.6 21.1 L14.8 19.2 Z" fill="#ffffff"/>
  <!-- keyhole = client-side end-to-end privacy -->
  <circle cx="16" cy="14.5" r="1.45" fill="url(#ac-key)"/>
  <path d="M15.35 14.9 H16.65 L17.1 17.3 H14.9 Z" fill="url(#ac-key)"/>
</svg>
